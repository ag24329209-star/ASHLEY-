<title>Para Ash — Todo lo que quiero que sepas</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Dancing+Script:wght@400;500;600;700&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #f5ede0;
  --warm: #e8d5b7;
  --parchment: #f2e4c8;
  --brown: #8b5e3c;
  --dark: #100b09;
  --dark2: #160e0b;
  --sepia-dark: #1e1208;
  --sepia: #5c3d2e;
  --gold: #c9a96e;
  --gold-light: #dfc08a;
  --rust: #8b3a1e;
  --text: #2d1f14;
  --text-light: rgba(245,237,224,0.75);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  background: var(--dark);
  color: var(--cream);
  font-family: 'Cormorant Garamond', serif;
  overflow-x: hidden;
  cursor: default;
}

.progress-bar {
  position: fixed;
  top: 0; left: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--gold), var(--rust));
  z-index: 1000;
  width: 0%;
  transition: width 0.1s linear;
}

nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 900;
  padding: 1.4rem 3rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: background 0.4s ease;
}

nav.scrolled {
  background: rgba(16,11,9,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(201,169,110,0.1);
}

.nav-logo {
  font-family: 'Dancing Script', cursive;
  font-size: 1.5rem;
  color: var(--gold);
  letter-spacing: 0.05em;
  opacity: 0.9;
}

.nav-links {
  display: flex;
  gap: 2.5rem;
  list-style: none;
}

.nav-links a {
  text-decoration: none;
  font-size: 0.72rem;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: rgba(245,237,224,0.5);
  transition: color 0.3s;
}

.nav-links a:hover { color: var(--gold); }

@media (max-width: 650px) {
  nav { padding: 1rem 1.5rem; }
  .nav-links { display: none; }
}
